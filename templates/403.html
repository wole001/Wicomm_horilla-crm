{% extends "error.html" %}
{% block content %}
    <img
        src="{% static 'assets/img/403.png' %}"
        alt="403"
        width="300"
        class="max-w-full h-auto flex justify-center m-auto"
    >
    <h2 class="error-title">{% trans "Permission Denied" %}</h2>
    <p class="error-description pb-3">
        {% if message %}{{ message }}{% else %}{% trans "You do not have permission to view this page." %}{% endif %}
    </p>
{% endblock %}
