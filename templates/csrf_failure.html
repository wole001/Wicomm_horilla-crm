{% extends "error.html" %}
{% block content %}
    <img
        src="{% static 'assets/img/403.png' %}"
        alt="{% trans 'Security check failed' %}"
        width="400"
        class="max-w-full h-auto mx-auto"
    >
    <h2 class="error-title">{% trans "Security Check Failed" %}</h2>
    <p class="error-description pb-3">
        {% if message %}{{ message }}{% else %}
            {% trans "We could not verify this request. Refresh the page and submit again." %}
        {% endif %}
    </p>
    <a
        href="/"
        class="
            text-sm px-6 py-3 bg-primary-600 rounded-md hover:bg-primary-800
            transition duration-300 text-white
        "
    >
        {% trans "Go to Dashboard" %}
    </a>
{% endblock %}
