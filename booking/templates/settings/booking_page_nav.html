<div class="flex items-center justify-between px-2 py-2 border-b">
    <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-200">{% trans "Booking Pages" %}</h2>
    {% if can_add %}
    <button
        hx-get="{% url 'booking:booking_page_create' %}"
        hx-target="#modalBox"
        hx-swap="innerHTML"
        onclick="openModal()"
        class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">
        <img src="{% static 'assets/icons/add.svg' %}" class="w-4 h-4" alt="">
        {% trans "New Booking Page" %}
    </button>
    {% endif %}
</div>
