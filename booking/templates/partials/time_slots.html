{% if error %}
    <p class="text-sm text-red-600 py-2">{{ error }}</p>
{% elif not selected_date %}
    <p class="text-sm text-gray-400 py-2">{% trans "Select a date to see available times." %}</p>
{% elif slots %}
    <p class="text-xs font-medium text-gray-500 mb-3 uppercase tracking-wide">
        {% trans "Available times" %}
    </p>
    <div class="grid grid-cols-3 gap-2">
        {% for slot in slots %}
        <button type="button"
            data-time="{{ slot|time:'H:i' }}"
            onclick="selectTimeSlot(this)"
            class="time-slot-btn px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:border-primary-500 hover:bg-primary-50 hover:text-primary-700 transition-colors text-center">
            {{ slot|time:"H:i" }}
        </button>
        {% endfor %}
    </div>
{% else %}
    <p class="text-sm text-gray-400 py-2">{% trans "No available slots for this date." %}</p>
{% endif %}
