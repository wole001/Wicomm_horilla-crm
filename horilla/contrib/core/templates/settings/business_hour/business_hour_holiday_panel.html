{% if business_hour %}
{% has_perm "core.change_businesshour" as can_change_bh %}

<div class="bg-white rounded-lg shadow-sm border border-dark-50 max-w-6xl" id="bh-holiday-accordion">

    <!-- Accordion header — always visible -->
    <div class="flex items-center justify-between px-4 py-3">
        <button
            type="button"
            class="flex items-center gap-2 text-left"
            onclick="toggleBhHolidayPanel(this)"
        >
            <h4 class="text-sm font-semibold text-gray-900">{% trans "Holidays" %}</h4>
            {% with count=linked_holidays.count %}
            {% if count %}
                <span class="inline-flex items-center rounded-full bg-primary-100 px-2 py-0.5 text-xs font-medium text-primary-700">
                    {{ count }}
                </span>
            {% endif %}
            {% endwith %}
            <svg
                id="bh-holiday-chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2.5"
                class="text-gray-400 transition-transform duration-200"
            >
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </button>

        {% if can_change_bh %}
            <button
                type="button"
                class="text-xs px-3 py-1.5 bg-primary-600 rounded-md text-white hover:bg-primary-800 transition duration-300"
                hx-get="{% url 'core:business_hour_add_holiday' business_hour.pk %}"
                hx-target="#modalBox"
                hx-swap="innerHTML"
                onclick="openModal()"
                title="{% trans 'Add Holiday' %}"
            >
                {% trans "Add Holiday" %}
            </button>
        {% endif %}
    </div>

    <!-- Accordion body — lazy-loaded on first expand -->
    <div id="bh-holiday-accordion-body" style="display:none" class="border-t border-dark-50">
        <div
            id="bh-holiday-list-wrapper"
            hx-get="{% url 'core:business_hour_holiday_list_view' business_hour.pk %}"
            hx-trigger="fetchList"
            hx-swap="innerHTML"
            hx-target="this"
        ></div>

        {% if can_change_bh and linked_holidays %}
        <div class="px-4 py-2 flex flex-wrap gap-2 border-t border-dark-50">
            {% for holiday in linked_holidays %}
            <span class="inline-flex items-center gap-1 rounded-full bg-primary-50 px-2 py-1 text-xs text-primary-700 border border-primary-200">
                {{ holiday.name }}
                <button
                    type="button"
                    class="ml-1 text-primary-400 hover:text-primary-700"
                    hx-post="{% url 'core:business_hour_holiday_toggle' business_hour.pk holiday.pk %}"
                    hx-vals='{"action": "remove"}'
                    hx-target="#bh-holiday-panel"
                    hx-swap="innerHTML"
                    hx-trigger="click"
                    title="{% trans 'Remove' %}"
                >&times;</button>
            </span>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</div>

<script>
function toggleBhHolidayPanel(btn) {
    var body = document.getElementById('bh-holiday-accordion-body');
    var chevron = document.getElementById('bh-holiday-chevron');
    var isOpen = body.style.display !== 'none';

    if (isOpen) {
        body.style.display = 'none';
        chevron.style.transform = '';
    } else {
        body.style.display = 'block';
        chevron.style.transform = 'rotate(180deg)';
        var wrapper = document.getElementById('bh-holiday-list-wrapper');
        if (wrapper && !wrapper.dataset.loaded) {
            wrapper.dataset.loaded = 'true';
            htmx.trigger(wrapper, 'fetchList');
        }
    }
}
</script>
{% endif %}
