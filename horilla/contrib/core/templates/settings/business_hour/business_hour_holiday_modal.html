{% has_perm "core.change_businesshour" as can_change_bh %}

<button
    id="reloadHolidayModalButton"
    hidden
    hx-get="{% url 'core:business_hour_holiday_modal' business_hour.pk %}"
    hx-target="#contentModalBox"
    hx-swap="innerHTML"
>reload</button>

<div class="flex flex-col bg-white rounded-lg overflow-hidden" style="max-height:80vh">

    <!-- Modal header -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-dark-50 shrink-0">
        <div class="flex items-center gap-2">
            <h3 class="text-sm font-semibold text-gray-900">{% trans "Holidays" %}</h3>
        </div>
        <div class="flex items-center gap-5">
            {% if can_change_bh and business_hour %}
                <button
                    type="button"
                    class="text-sm px-3 py-1.5 bg-primary-600 rounded-md text-white"
                    hx-get="{% url 'core:business_hour_add_holiday' business_hour.pk %}"
                    hx-target="#modalBox"
                    hx-swap="innerHTML"
                    onclick="openModal()"
                    title="{% trans 'Add Holiday' %}"
                >
                    {% trans "Add Holiday" %}
                </button>
            {% endif %}
            <button
                type="button"
                onclick="closeContentModal()"
                class="text-gray-400 hover:text-gray-600 transition-colors"
                aria-label="{% trans 'Close' %}"
            >
            <img src="{% static 'assets/icons/close.svg' %}" alt="{% trans 'Close' %}">
            </button>
        </div>
    </div>

    <div
        class="flex-1 overflow-auto p-4"
        hx-get="{% url 'core:business_hour_holiday_list_view' business_hour.pk %}"
        hx-trigger="load"
        hx-swap="innerHTML"
        hx-target="this"
    ></div>

</div>
