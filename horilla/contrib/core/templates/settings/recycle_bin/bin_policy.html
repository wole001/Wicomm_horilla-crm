{% block settings %}
    <div id="{{ view_id|safe }}" class="flex justify-between items-center pl-3 pt-3">
        {% include "messages.html" %}

        <button
            id="reloadButton"
            hidden
            hx-get="{% url 'core:recycle_bin_policy_view' %}?{{request.GET.urlencode}}"
            hx-target="#{{ view_id|safe }}"
            hx-swap="innerHTML"
            hx-select="#{{ view_id|safe }}"
        >
            click
        </button>
        <form
            hx-post="{% url 'core:recycle_bin_policy_view' %}"
            hx-swap="none"
            hx-on::after-request="$('#tab-recycle-view').click();"
        >
            {% csrf_token %}

            <div class="flex space-x-2 pb-2">
                <label class="text-sm text-color-600">
                    {% trans 'Default Expire Days' %}
                </label>
            </div>

            {% has_perm "core.change_recyclebinpolicy" as can_change_recyclebinpolicy %}

            <div class="flex flex-wrap items-center gap-2">
                <input
                    type="number"
                    id="id_days"
                    name="days"
                    value="{{ days|default:30 }}"
                    placeholder="{% trans 'Days' %}"
                    {% if not can_change_recyclebinpolicy %}
                        disabled
                    {% endif %}
                    class="h-[42px] w-[300px] p-2 text-sm text-color-600 placeholder:text-xs placeholder:text-dark-100 border border-dark-50 rounded-md mt-1 focus-visible:outline-0 transition focus:border-primary-600"
                >

                {% if can_change_recyclebinpolicy %}
                    <button
                        type="submit"
                        class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-800"
                    >
                        {% trans 'Save' %}
                    </button>
                {% endif %}
            </div>
        </form>
    </div>
{% endblock %}
