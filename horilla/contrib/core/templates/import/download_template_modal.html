<div class="p-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-800">{% trans "Select Fields for Template" %}</h2>
        <button type="button" onclick="closeContentModal()" class="text-gray-500 text-xl cursor-pointer">
            <img src="{% static 'assets/icons/close.svg' %}" alt="{% trans 'Close' %}">
        </button>
    </div>

    {% if error %}
        <div class="bg-red-50 text-red-500 px-4 py-3 rounded-lg text-sm">
            {{ error }}
        </div>
    {% else %}
        <form
            id="templateDownloadForm"
            hx-post="{% url 'core:download_template' %}"
            hx-ext="download"
            hx-trigger="submit"
            hx-on::after-request="closeContentModal();"
            hx-swap="none"
        >
            {% csrf_token %}
            <input type="hidden" name="module" value="{{ module }}">
            <input type="hidden" name="app_label" value="{{ app_label }}">

            <div class="mb-4">
                <label class="text-sm font-medium text-gray-700 mb-2 block">{% trans "File Format" %}</label>
                <select name="file_format" class="w-full js-example-basic-single">
                    <option value="xlsx">{% trans "Excel (XLSX)" %}</option>
                    <option value="csv">{% trans "CSV" %}</option>
                </select>
            </div>

            <div class="mb-4">
                <button
                    type="button"
                    id="toggleSelectAllBtn"
                    class="text-primary-600 hover:text-primary-800 text-sm font-semibold"
                    onclick="toggleSelectAllFields()"
                >
                    <span id="selectAllText">{% trans "Select All" %}</span>
                </button>
            </div>

            <div class="max-h-[400px] overflow-y-auto border border-dark-50 rounded-md p-4 mb-4">
                <div class="grid grid-cols-3 gap-2">
                    {% for field in fields %}
                        <div class="p-2">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input
                                    type="checkbox"
                                    name="selected_fields"
                                    value="{{ field.name }}"
                                    class="w-4 h-4 bg-[#E9EDF7] rounded-sm accent-[#e54f38]"
                                    {% if field.required %}
                                        checked
                                        data-required="true"
                                    {% endif %}
                                    onchange="updateSelectAllButton()"
                                >
                                <span class="flex-1 text-sm text-gray-700">
                                    {{ field.verbose_name }}
                                    {% if field.required %}
                                        <span class="text-red-500 text-xs ml-1">*</span>
                                    {% endif %}
                                </span>
                            </label>
                        </div>
                    {% endfor %}
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <button
                    type="submit"
                    class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700 transition"
                >
                    <i class="fa-solid fa-download mr-2"></i>
                    {% trans "Download Template" %}
                </button>
            </div>
        </form>

        <script>
            function getOptionalCheckboxes() {
                return Array.from(document.querySelectorAll('#templateDownloadForm input[type="checkbox"][name="selected_fields"]'))
                    .filter(cb => cb.dataset.required !== 'true');
            }

            function toggleSelectAllFields() {
                const optional = getOptionalCheckboxes();
                if (!optional.length) {
                    return;
                }

                const allChecked = optional.every(cb => cb.checked);
                if (allChecked) {
                    optional.forEach(cb => cb.checked = false);
                } else {
                    optional.forEach(cb => cb.checked = true);
                }
                updateSelectAllButton();
            }

            function updateSelectAllButton() {
                const optional = getOptionalCheckboxes();
                const selectAllText = document.getElementById('selectAllText');

                if (!optional.length) {
                    if (selectAllText) {
                        selectAllText.textContent = "{% trans 'Select All' %}";
                    }
                    return;
                }

                const allChecked = optional.every(cb => cb.checked);
                if (selectAllText) {
                    selectAllText.textContent = allChecked ? "{% trans 'Unselect All' %}" : "{% trans 'Select All' %}";
                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                updateSelectAllButton();
            });

            document.body.addEventListener('htmx:afterSwap', function(event) {
                if (event.detail.target.id === 'contentModalBox') {
                    setTimeout(updateSelectAllButton, 100);
                }
            });
        </script>
    {% endif %}
</div>
