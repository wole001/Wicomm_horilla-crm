<button
    hx-get="{% url 'user-request-update' instance.id %}"
    hx-target="#genericModalBody"
    data-toggle="oh-modal-toggle"
    data-target="#genericModal"
    class="w-24 justify-center px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center gap-2 hover:bg-primary-800 transition duration-300"
>
    <img
        src="{% static 'assets/img/icons/edit.svg' %}"
        alt="{% trans 'Edit' %}"
        width="13"
        class="filter brightness-0 invert"
    >
    {% trans 'Edit' %}
</button>
<form
    hx-confirm="{% trans 'Are you sure you want to delete this holiday?' %}"
    hx-post="{% url 'user-request-delete' instance.id  %}"
    hx-target="#genericModalBody"
>
    {% csrf_token %}
    <button
        data-action="delete"
        type="submit"
        class="w-24 justify-center px-4 py-2 bg-[white] rounded-md text-xs flex items-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
    >
        <img
            src="{% static 'assets/img/icons/trash.svg' %}"
            alt="{% trans 'Delete' %}"
            width="16"
            class="mt-[-1px]"
        >{% trans "Delete" %}
    </button>
</form>
