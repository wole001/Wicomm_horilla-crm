<div
    class="bg-white rounded-xl shadow-xl flex flex-col overflow-hidden w-full p-5"
    style="max-height:85vh;"
    data-field-id="{{ field_id }}"
>
    <!-- Header -->
    <div class="flex justify-between items-center pb-3">
        <h2 class="text-lg font-semibold">{{ field_label }}</h2>
        <a onclick="closehorillaModal()" class="text-gray-500 hover:text-red-500 text-xl cursor-pointer">
            <img src="{% static 'assets/icons/close.svg' %}" alt="{% trans 'Close' %}">
        </a>
    </div>
    <!-- Search & Filter toolbar -->
    <div class="flex items-center gap-2 pb-3 border-b border-dark-50">
        <!-- Search -->
        <div class="relative flex-1">
            <input
                id="userPickerSearch"
                name="search"
                type="text"
                placeholder="{% trans 'Search' %}"
                class="text-color-600 px-2 py-1.5 pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-[#d3d3d3] placeholder:text-xs text-sm transition duration-300 focus:border-primary-600"
                hx-get="{{ list_url }}"
                hx-trigger="keyup changed delay:300ms, search"
                hx-target="#userPickerList"
                hx-swap="innerHTML"
                hx-include="#up-filter-rows [name='field'],[name='operator'],[name='value'],[name='start_value'],[name='end_value']"
                hx-push-url="false"
            />
            <button type="button" class="absolute right-3 top-0 bottom-0 m-auto cursor-pointer">
                <img src="{% static 'assets/icons/search.svg' %}" alt="{% trans 'Search' %}" width="16">
            </button>
        </div>
        <!-- Filter toggle -->
        <div
            class="bg-[#f3f4f6] w-10 h-10 flex items-center justify-center rounded transition duration-300 cursor-pointer flex-shrink-0"
            hx-get="{{ filter_url }}"
            hx-target="#up-filter-rows"
            hx-swap="innerHTML"
            hx-trigger="click[document.getElementById('up-filter-rows').children.length===0]"
            hx-push-url="false"
            onclick="document.getElementById('userPickerFilterPanel').classList.toggle('hidden')"
        >
            <button type="button" class="filtermenu" title="{% trans 'Filter' %}">
                <img src="{% static 'assets/icons/l4.svg' %}" alt="{% trans 'Filter' %}" width="14">
            </button>
        </div>
    </div>

    <!-- Filter Panel (hidden by default) -->
    <div id="userPickerFilterPanel" class="hidden border-b border-dark-50 bg-gray-50 pb-5">
        <div class="py-3">
            <div id="up-filter-rows" class="space-y-2"></div>
            <div class="flex justify-between items-center mt-3">
                <button
                    type="button"
                    class="flex gap-1.5 text-xs text-primary-600 hover:text-primary-800 transition-colors"
                    onclick="upAddFilterRow('{{ filter_url }}')"
                >
                    <img src="{% static 'assets/icons/filter.svg' %}" alt="" width="11">
                    {% trans "Add more filter" %}
                </button>
                <div class="flex gap-2">
                    <button
                        type="button"
                        class="text-xs border border-dark-50 text-color-600 px-3 py-1 rounded-md hover:bg-gray-100 transition-colors"
                        hx-get="{{ filter_url }}"
                        hx-target="#up-filter-rows"
                        hx-swap="innerHTML"
                        hx-push-url="false"
                        hx-on:htmx:after-swap="htmx.ajax('GET','{{ list_url }}',{target:'#userPickerList',swap:'innerHTML'})"
                    >
                        {% trans "Clear" %}
                    </button>
                    <button
                        type="button"
                        class="text-xs px-3 py-1 bg-primary-600 rounded-md hover:bg-primary-800 transition-colors text-white"
                        hx-get="{{ list_url }}"
                        hx-target="#userPickerList"
                        hx-swap="innerHTML"
                        hx-include="#userPickerSearch,#up-filter-rows [name='field'],[name='operator'],[name='value'],[name='start_value'],[name='end_value']"
                        hx-push-url="false"
                    >
                        {% trans "Apply" %}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- List -->
    <div class="flex-1 overflow-y-auto custom-scroll" style="min-height:0;">
        <div class="flex items-center gap-3 px-5 py-2.5 border-b border-dark-50 sticky top-0 z-10 bg-primary-300 text-primary-600">
            <input
                type="checkbox"
                id="userPickerSelectAll"
                class="w-4 h-4 bg-white rounded accent-[#e54f38] cursor-pointer"
                onchange="upToggleAll(this)"
            />
            <label for="userPickerSelectAll" class="text-xs font-semibold text-color-600 cursor-pointer select-none uppercase tracking-wide">
                {% trans "Select All" %}
            </label>
            <span id="userPickerCount" class="ml-auto text-xs text-gray-400"></span>
        </div>
        <div
            id="userPickerList"
            class="divide-y divide-dark-50 border-l border-dark-50"
            hx-get="{{ list_url }}"
            hx-trigger="load"
            hx-swap="innerHTML"
            hx-push-url="false"
        ></div>
        <div id="up-list-load-more" class="htmx-indicator p-4 flex justify-center">
            <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-primary-600"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end  pt-5 border-t border-dark-50 gap-2">
        <button
            type="button"
            onclick="userPickerConfirm()"
            class="text-sm bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 transition-colors flex items-center gap-1.5"
        >
            {% trans "Select" %}
        </button>
    </div>
</div>
