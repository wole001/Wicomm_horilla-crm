{% if items %}
    {% for item in items %}
    <div
        class="flex items-center gap-3 px-5 py-3 cursor-pointer transition-colors hover:bg-gray-50 up-list-row"
        data-id="{{ item.id }}"
        data-text="{{ item.text }}"
        onclick="upRowClick(this)"
    >
        <input
            type="checkbox"
            class="up-row-cb w-4 h-4 bg-[#E9EDF7] rounded accent-[#e54f38] cursor-pointer flex-shrink-0"
            value="{{ item.id }}"
            onchange="upCbChange(this)"
            onclick="event.stopPropagation()"
        >
        <span class="w-7 h-7 rounded-full bg-primary-100 text-primary-600 text-xs font-semibold flex items-center justify-center flex-shrink-0 up-avatar">
            {{ item.text|slice:":1"|upper }}
        </span>
        <span class="text-sm text-gray-800 truncate">{{ item.text }}</span>
    </div>
    {% endfor %}
    {% if page_obj.has_next %}
    <div
        style="height:1px;padding:0;margin:0;border:none;"
        hx-get="{{ request.path }}?{{ request.GET.urlencode }}&page={{ page_obj.next_page_number }}"
        hx-trigger="intersect once"
        hx-swap="outerHTML"
        hx-target="this"
        hx-indicator="#up-list-load-more"
    ></div>
    {% endif %}
{% else %}
    <div class="text-center text-sm text-gray-400 py-10">{% trans 'No results found' %}</div>
{% endif %}
