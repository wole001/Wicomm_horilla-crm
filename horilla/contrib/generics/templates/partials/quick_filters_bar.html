{% if enable_quick_filters and view_type == "all" %}
    <style>
        #quick-filters-bar-{{ view_id|safe }} .select2-container .select2-selection--single {
            height: 26px !important;
        }
        #quick-filters-bar-{{ view_id|safe }} .select2-container--default .select2-selection--single {
            height: 26px !important;
        }
        #quick-filters-bar-{{ view_id|safe }} .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 24px !important;
        }
        #quick-filters-bar-{{ view_id|safe }} .select2-container--default .select2-selection--single .select2-selection__arrow {
            top: 1px !important;
            height: 24px !important;
        }
    </style>
    <div id="quick-filters-bar-{{ view_id|safe }}" class="{% if quick_filters %}mb-4{% endif %}">
        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-3">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 flex-1">
                {% if quick_filters %}
                    {% for qf in quick_filters %}
                        <div class="group relative flex items-center gap-2 bg-white border border-dark-50 rounded-lg px-1 py-1 shadow-sm hover:shadow-md transition-all duration-200 w-full">
                            <div class="flex items-center gap-2 flex-1 min-w-0">
                                <div class="flex-shrink-0">
                                    <i class="fa-solid fa-filter text-primary-600 text-xs"></i>
                                </div>
                                <label
                                    for="qf_{{ qf.field_name }}"
                                    class="text-xs text-gray-700 whitespace-nowrap font-semibold flex-shrink-0"
                                >
                                    {{ qf.verbose_name }}:
                                </label>
                                <div class="flex-1 min-w-[120px]">
                                    <select
                                        id="qf_{{ qf.field_name }}"
                                        name="qf_{{ qf.field_name }}"
                                        class="js-example-basic-single text-xs"
                                        style="width: 100%"
                                        hx-get="{{ main_url }}?{% for key, value in request.GET.items %}{% if key != 'page' and key != 'hx_trigger' %}{{ key }}={{ value|urlencode }}&{% endif %}{% endfor %}"
                                        hx-target="#{{ main_session_id|default:'mainSession' }}"
                                        hx-select="#{{ main_session_id|default:'mainSession' }}"
                                        hx-swap="outerHTML"
                                        hx-push-url="true"
                                        hx-include="[name^='qf_']"
                                    >
                                        <option value="">{% trans 'All' %}</option>
                                        {% for choice in qf.choices %}
                                            <option
                                                value="{{ choice.value }}"
                                                {% if choice.value == qf.selected_value %}
                                                    selected
                                                {% endif %}
                                            >
                                                {{ choice.label }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <button
                                type="button"
                                hx-post="{{ search_url }}"
                                hx-vals='{"action": "remove_quick_filter", "filter_id": "{{ qf.id }}"}'
                                hx-target="#quick-filters-bar-{{ view_id|safe }}"
                                hx-select="#quick-filters-bar-{{ view_id|safe }}"
                                hx-select-oob="#{{ main_session_id|default:'mainSession' }}"
                                hx-swap="outerHTML"
                                hx-trigger="confirmed"
                                hx-on:click="hxConfirm(this,'{% trans "Are you sure you want to delete this quick filter" %}')"
                                class="flex-shrink-0 rounded-md text-gray-400 transition-all duration-200 group/remove"
                                title="{% trans 'Remove filter' %}"
                            >
                                <i class="fa-solid fa-times text-xs"></i>
                            </button>
                        </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
{% endif %}
