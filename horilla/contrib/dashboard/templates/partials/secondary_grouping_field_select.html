<label for="id_secondary_grouping" class="text-xs text-color-600">{% trans "Secondary Grouping Field" %}</label>
<select name="secondary_grouping" id="id_secondary_grouping" class="js-example-basic-single headselect">
    {% for value, label in field_choices %}
        <option value="{{ value }}" {% if current_secondary and value == current_secondary %}selected{% endif %}>
            {{ label }}
        </option>
    {% endfor %}
</select>
