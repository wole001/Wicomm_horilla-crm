<div class="flex rounded-md overflow-hidden [&>button:first-of-type]:rounded-l-md [&>button:last-of-type]:rounded-r-md [&>button:last-of-type]:border-r-0">
    {% has_perm "reports.change_report" as can_change_report %}
    {% if can_change_report or instance.dashboard_owner == request.user %}
        <button
            type="button"
            class="w-10 h-7 bg-dark-25 flex-1 flex justify-center border-r border-r-[white] hover:bg-dark-50 transition duration-300 items-center"
            title="{% trans 'Favourite' %}"
            aria-label="{% trans 'Favourite' %}"
            hx-post="{% url 'reports:mark_report_favourite' instance.id %}?{{ request.GET.urlencode }}"
            hx-swap="outerHTML"
            hx-trigger="click"
        >
            <i class="fa-solid fa-star {% if instance.is_favourite %}text-primary-600{% endif %}"></i>
        </button>
        <button
            type="button"
            class="w-10 h-7 bg-dark-25 flex-1 flex justify-center border-r border-r-[white] hover:bg-dark-50 transition duration-300 items-center"
            title="{% trans 'Edit' %}"
            aria-label="{% trans 'Edit' %}"
            hx-get="{% url 'reports:update_report' instance.id %}?{{ request.GET.urlencode }}"
            hx-target="#modalBox"
            hx-swap="innerHTML"
            onclick="openModal()"
        >
            <img src="{% static 'assets/icons/edit.svg' %}" alt="" width="16" class="w-4 h-4">
        </button>
        <button
            type="button"
            class="w-10 h-7 bg-dark-25 flex-1 flex justify-center border-r border-r-[white] hover:bg-dark-50 transition duration-300 items-center"
            title="{% trans 'Move' %}"
            aria-label="{% trans 'Move' %}"
            hx-get="{% url 'reports:move_report_to_folder' instance.id %}?{{ request.GET.urlencode }}"
            hx-target="#modalBox"
            hx-swap="innerHTML"
            onclick="openModal()"
        >
            <img src="{% static 'assets/icons/a2.svg' %}" alt="" width="16" class="w-4 h-4">
        </button>
    {% endif %}
    {% has_perm "reports.delete_report" as can_delete_report %}
    {% if can_delete_report %}
        <button
            type="button"
            class="w-10 h-7 bg-dark-25 flex-1 flex justify-center border-r border-r-[white] hover:bg-dark-50 transition duration-300 items-center"
            title="{% trans 'Delete' %}"
            aria-label="{% trans 'Delete' %}"
            hx-post="{% url 'reports:delete_report' instance.id %}?{{ request.GET.urlencode }}"
            hx-target="#deleteModeBox"
            hx-swap="innerHTML"
            onclick="openDeleteModeModal()"
            hx-vals='{"check_dependencies": "true"}'
        >
            <img src="{% static 'assets/icons/a4.svg' %}" alt="" width="16" class="w-4 h-4">
        </button>
    {% endif %}
</div>
