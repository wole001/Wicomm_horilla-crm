<form hx-post="{{ url }}" hx-trigger="change from:select" class="w-full">
    {% csrf_token %}
    <input type="hidden" name="task_id" value="{{ instance.pk }}">
    <select name="status" class="js-example-basic-single headselect mt-0 w-full">
        {% for val, label in status_choices %}
            <option value="{{ val }}" {% if instance.status == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</form>
