{% if scope == "specific_fields" %}
    <div
        class="{% if side == 'rejected' %}mt-3{% else %}mb-3{% endif %}"
        id="id_record_{{ side }}_fields{% if stage_key %}_{{ stage_key }}{% endif %}_wrap"
    >
        <label
            class="text-xs text-color-600"
            for="id_record_{{ side }}_fields{% if stage_key %}_{{ stage_key }}{% endif %}"
        >{% trans "Select fields" %}</label>
        <select
            id="id_record_{{ side }}_fields{% if stage_key %}_{{ stage_key }}{% endif %}"
            name="record_{{ side }}_fields{% if stage_key %}_{{ stage_key }}{% endif %}"
            multiple
            data-placeholder="{% trans 'Select fields' %}"
            class="js-example-basic-multiple headselect text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md mt-1 focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
        >
            {% for f in record_field_choices %}
                <option value="{{ f.name }}" {% if f.name in selected_values %}selected{% endif %}>
                    {{ f.label }}
                </option>
            {% empty %}
                <option value="" disabled>{% trans "No fields available" %}</option>
            {% endfor %}
        </select>
    </div>
{% else %}
    <div
        id="id_record_{{ side }}_fields{% if stage_key %}_{{ stage_key }}{% endif %}_wrap"
        class="{% if side == 'rejected' %}mt-3{% else %}mb-3{% endif %}"
        style="display: none"
    >
    </div>
{% endif %}
