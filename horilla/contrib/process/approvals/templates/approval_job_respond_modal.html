<form
    hx-post="{% url 'approvals:approval_job_respond_modal_view' job.pk %}"
    hx-target="#modalBox"
    hx-swap="innerHTML"
>
    {% csrf_token %}
    <div class="relative bg-white rounded-lg shadow-sm">
        <div class="p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-md font-semibold">{% trans "Respond to Approval" %}</h2>
                <button
                    type="button"
                    onclick="closeModal()"
                    class="text-gray-500 hover:text-red-500 text-xl cursor-pointer"
                >
                    <img src="{% static 'assets/icons/close.svg' %}" alt="{% trans 'Close' %}">
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-color-600" for="decision">{% trans "Decision" %}</label>
                    <select
                        name="decision"
                        id="decision"
                        class="w-full js-example-basic-single headselect"
                        onchange="document.getElementById('delegate-user-wrap').style.display = this.value === 'delegate' ? 'block' : 'none'"
                    >
                        <option value="approve">{% trans "Approve" %}</option>
                        <option value="reject">{% trans "Reject" %}</option>
                        <option value="delegate">{% trans "Delegate" %}</option>
                    </select>
                </div>
                <div id="delegate-user-wrap" style="display: none">
                    <label class="text-xs text-color-600" for="delegate_user">{% trans "Delegate To" %}</label>
                    <select name="delegate_user" id="delegate_user" class="w-full js-example-basic-single headselect">
                        <option value="">{% trans "Select user" %}</option>
                        {% for user in delegate_users %}
                            <option value="{{ user.id }}">{{ user }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <label
                class="text-xs text-color-600 mt-3 block"
                for="review_note"
            >{% trans "Response Note (Optional)" %}</label>
            <textarea
                id="review_note"
                name="review_note"
                rows="4"
                class="text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md mt-1 focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
                placeholder="{% trans 'Add comments for your decision' %}"
            ></textarea>
        </div>

        <div class="flex justify-end gap-2 p-5 pt-0">
            <button type="submit" class="text-sm px-5 py-2 bg-primary-600 rounded-md text-white">
                {% trans "Submit Response" %}
            </button>
        </div>
    </div>
</form>
