<label class="inline-flex items-center cursor-pointer">
    <input
        type="checkbox"
        class="sr-only peer"
        {% if instance.is_active %}
            checked
        {% endif %}
        hx-post="{% url 'approvals:approval_process_toggle_view' instance.id %}?{{ request.GET.urlencode}}"
        value="{{instance.is_active}}"
        hx-swap="innerHTML"
        hx-trigger="confirmed"
        hx-on:click="hxConfirm(this, '{% if instance.is_active %}{% trans "Are you sure you want to deactivate this approval process?" %}{% else %}{% blocktrans with module=instance.model %}Activating this will deactivate any other active approval process for the {{ module }} module. Do you want to continue?{% endblocktrans %}{% endif %}')"
    >
    <div class="relative w-11 h-5 bg-gray-200 rounded-full peer peer-checked:bg-primary-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-6">
    </div>
</label>
