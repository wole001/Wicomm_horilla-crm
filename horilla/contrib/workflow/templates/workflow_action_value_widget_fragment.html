{% if widget.kind == "select" %}
    <select
        id="wf-action-popup-value"
        name="update_value"
        class="js-example-basic-single headselect text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
    >
        <option value="">{% trans "Select value" %}</option>
        {% for c in widget.choices %}
            <option value="{{ c.value }}" {% if current_value == c.value %}selected{% endif %}>{{ c.label }}</option>
        {% endfor %}
    </select>
    <script>
    (function(){
        if (window.$ && $.fn.select2) {
            $("#wf-action-popup-value").select2({ width: "100%" });
        }
    })();
    </script>
{% else %}
    <input
        id="wf-action-popup-value"
        name="update_value"
        type="{{ widget.input_type|default:'text' }}"
        value="{{ current_value|default:'' }}"
        class="text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
    >
{% endif %}
