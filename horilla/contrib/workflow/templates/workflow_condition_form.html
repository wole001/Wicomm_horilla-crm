<div class="bg-white rounded-lg p-5">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold">
            {% if edit_pk %}{% trans "Edit Condition" %}{% else %}{% trans "Add Condition" %}{% endif %}
        </h3>
        <button type="button" onclick="closeModal()" class="text-gray-500 hover:text-red-500 text-lg leading-none">&times;</button>
    </div>

    <form
        id="workflow-condition-save-form"
        hx-post="{% if edit_pk %}{% url 'workflow:workflow_condition_edit_view' pk=edit_pk %}{% else %}{% url 'workflow:workflow_condition_add_view' rule_pk=rule.pk %}{% endif %}"
        hx-target="#workflow-condition-form-wrap"
        hx-swap="innerHTML"
    >
        {% csrf_token %}
        <input type="hidden" name="rule" value="{{ rule.pk }}">
        <input type="hidden" name="order" value="{{ next_order }}">

        <div class="grid grid-cols-1 gap-4">

            {# Field #}
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-color-600">{% trans "Field" %}</label>
                    <select
                        name="field"
                        id="workflow-condition-field"
                        class="js-example-basic-single headselect text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
                    >
                        <option value="">{% trans "---------" %}</option>
                        {% for val, label in model_fields %}
                            <option value="{{ val }}" {% if form.initial.field == val or form.instance.field == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                {# Operator #}
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-color-600">{% trans "Operator" %}</label>
                    <select
                        name="operator"
                        id="workflow-condition-operator"
                        class="js-example-basic-single headselect text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
                    >
                        <option value="">{% trans "---------" %}</option>
                        {% for val, label in form.fields.operator.choices %}
                            {% if val %}
                                <option value="{{ val }}" {% if form.instance.operator == val %}selected{% endif %}>{{ label }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>

                {# Value #}
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-color-600">{% trans "Value" %}</label>
                    <input
                        type="text"
                        name="value"
                        id="workflow-condition-value"
                        value="{{ form.instance.value|default:'' }}"
                        class="text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
                    >
                </div>
            </div>

            {# Logical Operator #}
            <div class="flex flex-col gap-1">
                <label class="text-xs text-color-600">{% trans "Logical Operator (join with next condition)" %}</label>
                <select
                    name="logical_operator"
                    class="js-example-basic-single headselect text-color-600 p-2 placeholder:text-xs pr-[40px] w-full border border-dark-50 rounded-md focus-visible:outline-0 placeholder:text-dark-100 text-sm [transition:.3s] focus:border-primary-600"
                >
                    <option value="and" {% if form.instance.logical_operator == "and" or not form.instance.pk %}selected{% endif %}>{% trans "AND" %}</option>
                    <option value="or" {% if form.instance.logical_operator == "or" %}selected{% endif %}>{% trans "OR" %}</option>
                </select>
            </div>

            {# Form errors #}
            {% if form.non_field_errors %}
                <div class="text-xs text-red-600 bg-red-50 border border-red-200 rounded-md p-2">
                    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                </div>
            {% endif %}

        </div>

        <div class="flex justify-end gap-2 mt-4">
            <button
                type="button"
                class="text-sm px-3 py-2 border border-primary-600 rounded-md text-primary-600 hover:bg-primary-50"
                onclick="closeModal()"
            >
                {% trans "Cancel" %}
            </button>
            <button
                type="submit"
                class="text-sm px-3 py-2 bg-primary-600 rounded-md text-white hover:bg-primary-700"
            >
                {% trans "Save" %}
            </button>
        </div>
    </form>
</div>

<script>
    (function () {
        if (window.$ && $.fn.select2) {
            $(".js-example-basic-single").select2({ width: "100%" });
        }
    })();
</script>
