# Horilla-CRM Configuration for Windows
# Edit this file to customize your installation

# Django Settings
DJANGO_SETTINGS_MODULE=horilla.settings
SECRET_KEY=change-this-in-production
DEBUG=0

# Server Configuration
ALLOWED_HOSTS=localhost,127.0.0.1
CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000

# Database Configuration
# For SQLite (default):
# DATABASE_URL=sqlite:///C:/Users/{username}/AppData/Roaming/Horilla-CRM/data/horilla.db

# For PostgreSQL:
# DATABASE_URL=postgres://username:password@localhost:5432/horilla_crm

# For MySQL:
# DATABASE_URL=mysql://username:password@localhost:3306/horilla_crm

# Redis Configuration (for WebSocket notifications)
# REDIS_URL=redis://localhost:6379/0

# Email Configuration
# EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
# EMAIL_HOST=smtp.gmail.com
# EMAIL_PORT=587
# EMAIL_USE_TLS=1
# EMAIL_HOST_USER=your-email@gmail.com
# EMAIL_HOST_PASSWORD=your-app-password

# Logging Configuration
LOGGING_LEVEL=INFO

# Application Settings
DEFAULT_FROM_EMAIL=noreply@yourdomain.com
SITE_URL=http://localhost:8000

# File Upload Settings
FILE_UPLOAD_MAX_MEMORY_SIZE=52428800
DATA_UPLOAD_MAX_MEMORY_SIZE=52428800

# Session Settings
SESSION_COOKIE_AGE=86400
SESSION_SAVE_EVERY_REQUEST=1

# Security Settings (for production)
# SECURE_SSL_REDIRECT=1
# SECURE_BROWSER_XSS_FILTER=1
# SECURE_CONTENT_TYPE_NOSNIFF=1
# X_FRAME_OPTIONS=DENY
